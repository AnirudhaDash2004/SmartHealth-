<!DOCTYPE html>
<html>
<head>
    <title>SmartHealth+ Login</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .box{
            width:350px;
            margin:100px auto;
            padding:25px;
            background:white;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:95%;
            padding:10px;
            background:#28a745;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        .title{
            font-size:22px;
            margin-bottom:10px;
        }

        .note{
            font-size:12px;
            color:gray;
            line-height: 1.6;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="title">🏥 SmartHealth+ Login</div>
    <div class="note">Admin • Doctor • Staff Access</div>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p class="note">
        Admin: admin / admin123<br>
        Doctor: doctor1 / doctor123<br>
        Staff: staff1 / staff123
    </p>

</div>

</body>
</html>
